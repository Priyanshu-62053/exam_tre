<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- <h2 id="score"></h2>
<h3 id="total"></h3> -->

<!-- main div  -->
 <div class="container">
<!--  1 heading section : -->
  
 <section>
  <div class="heading">
  <h2>BPSC TRE Computer Science Performance Report</h2>
 </div>
 </section>

 <!-- middle section  -->
  <section>
    <div class="middle">
    <div id="sign"><h1>🙍🏼‍♂️</h1></div>
    <h3> Test Submitted Successfully!</h3>
    <h3 id="scorePercent">Your Score  : 90%</h3>

    </div>
  </section>

  <!-- last section  -->

  <section id="dataSection">
     
    <div class="data">
      <!-- <h4>📝 Exam Summary</h4> -->
      <!-- <br> <hr> -->
      <div class="result-line">
        <span>Total Questions:</span>
      <span id="toatal_question"></span>
      </div>
      <br><hr>
      <div class="result-line">
        <span>Correct Answer:</span>
      <span id="correct_answer"></span>
      </div>
      <br><hr>
      <div class="result-line">
        <span>Wrong Answer:   :</span>
      <span id="wrong_answer"></span>
      </div>
      <br><hr>
      <div class="result-line">
        <span>You Score:</span>
      <span id="your_score"></span>
      </div>
    </div>
 
    <div class="dataPart2">
  <div class="result-line">
        <span>Time Taken</span>
      <span id="time"></span>
      </div>
      <br><hr>
      <div class="result-line">
        <span>Grade:</span>
      <span id="grading"></span>
      </div>
      <br><hr>
      <div class="result-line">
        <span>Percentage:</span>
      <span id="percent" class="percent_span"></span>
      </div>
      <br><hr>
     <div class="result-line">
        <span>Performance:</span>
      <span id="performence"></span>
      </div>
    </div>
  </section>

   <section>
    <div class="btn-section">
      <button id="rank-btn">📈 Leaderboard</button>
      <button id="review-btn">Review Test</button>
    </div>
   </section>



 
  </div>

  <script src="script.js"></script>
</body>
</html>
